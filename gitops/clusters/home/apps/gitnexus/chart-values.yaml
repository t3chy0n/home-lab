replicaCount: 1

server:
  image:
    tag: "latest"

web:
  image:
    tag: "latest"

persistence:
  enabled: true
  size: 10Gi
  storageClass: qnap-iscsi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-ca
    nginx.ingress.kubernetes.io/auth-url: "https://oauth.lab.techyon.dev/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://oauth.lab.techyon.dev/oauth2/start?rd=https://$host$escaped_request_uri"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: GitNexus
    gethomepage.dev/description: Code Knowledge Graph
    gethomepage.dev/group: Developer
    gethomepage.dev/icon: mdi-graph-outline
  hosts:
    - host: gitnexus.lab.techyon.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gitnexus-web-tls
      hosts:
        - gitnexus.lab.techyon.dev

serverIngress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-ca
    nginx.ingress.kubernetes.io/auth-url: "https://oauth.lab.techyon.dev/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://oauth.lab.techyon.dev/oauth2/start?rd=https://$host$escaped_request_uri"
  hosts:
    - host: gitnexus-api.lab.techyon.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gitnexus-server-tls
      hosts:
        - gitnexus-api.lab.techyon.dev

resources:
  server:
    limits:
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  web:
    limits:
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi
