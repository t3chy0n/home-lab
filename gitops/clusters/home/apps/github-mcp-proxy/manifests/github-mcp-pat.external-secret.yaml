# GitHub PAT for the self-hosted github MCP server. Pulled from the
# `GH_CLAUDE_CODE` 1Password item and exposed as the env var
# GITHUB_PERSONAL_ACCESS_TOKEN that the github-mcp-server binary reads.
#
# The `property:` field is the 1Password field name. Common values are
# `password`, `credential`, or `token` — verify with:
#     op item get GH_CLAUDE_CODE --format json | jq '.fields[] | {label, id}'
# and adjust below if needed. If unset, ESO grabs the item's primary field.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-mcp-pat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: github-mcp-pat-secret
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_PERSONAL_ACCESS_TOKEN
      remoteRef:
        key: GH_CLAUDE_CODE
        property: password
