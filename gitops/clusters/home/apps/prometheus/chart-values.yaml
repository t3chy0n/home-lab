
#https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
crds:
  enabled: true

grafana:
  # Google Workspace OIDC. Client ID + Secret are injected as env vars from
  # the grafana-google-oidc Secret (populated from 1Password via the
  # ExternalSecret in external-secrets/manifests/google-oauth.external-secret.yaml).
  # Grafana reads GF_AUTH_GOOGLE_CLIENT_ID / GF_AUTH_GOOGLE_CLIENT_SECRET from
  # the environment and overrides the matching grafana.ini values — so we
  # intentionally omit literal client_id / client_secret in grafana.ini below.
  envFromSecret: grafana-google-oidc

  grafana.ini:
    server:
      root_url: https://grafana.lab.techyon.dev
    auth.google:
      enabled: true
      scopes: openid email profile
      auth_url: https://accounts.google.com/o/oauth2/v2/auth
      token_url: https://oauth2.googleapis.com/token
      api_url: https://openidconnect.googleapis.com/v1/userinfo
      allowed_domains: techyon.dev
      hosted_domain: techyon.dev
      allow_sign_up: true
    # All Google-SSO users are auto-assigned Admin on first login — same
    # policy as ArgoCD (policy.default: role:admin). Single-operator lab,
    # the hosted_domain claim restricts logins to techyon.dev so no
    # outsiders can land here. If you ever need to scope this down, switch
    # to a JMESPath role_attribute_path on [auth.google] instead.
    users:
      auto_assign_org: true
      auto_assign_org_role: Admin
    # Keep the local admin login form available as a break-glass path.
    auth:
      disable_login_form: false

  # Loki and Tempo are deployed as sibling ArgoCD apps in this same namespace
  # (see ../loki/ and ../tempo/). They plug into the Grafana bundled with
  # kube-prometheus-stack as additional datasources. The derivedFields entry
  # on the Loki datasource turns any "trace_id=<hex>" in a log line into a
  # clickable link that jumps to the matching Tempo trace view.
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      jsonData:
        # Native-OTLP logs (alloy-gateway → Loki /otlp) carry the trace id as the
        # `trace_id` structured-metadata field, which becomes a click-through link
        # to Tempo. The second entry is a fallback that matches legacy JSON-blob
        # log lines ("traceid":"<hex>") still within Loki retention.
        derivedFields:
          - name: TraceID
            matcherType: label
            matcherRegex: trace_id
            url: "$${__value.raw}"
            datasourceUid: tempo
            urlDisplayLabel: View Trace
          - name: TraceIDLegacy
            matcherType: regex
            matcherRegex: '"traceid":"(\w+)"'
            url: "$${__value.raw}"
            datasourceUid: tempo
    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3200
      jsonData:
        # Jump from a span to its logs in Loki, matched by trace id within the
        # span's time window. serviceMap (service graph) is wired in P2 once the
        # Tempo metrics-generator is enabled.
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-5m"
          spanEndTimeShift: "5m"
          filterByTraceID: true
          filterBySpanID: false
          tags:
            - key: service.name
              value: service_name
        nodeGraph:
          enabled: true
    - name: Pyroscope
      type: grafana-pyroscope-datasource
      uid: pyroscope
      access: proxy
      url: http://pyroscope.monitoring.svc.cluster.local:4040