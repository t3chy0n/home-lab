# LAN-facing Redis Service. Mirrors the postgres-ha-lb pattern exactly:
# MetalLB allocates an IP from the shared pool, external-dns registers
# redis.lab.techyon.dev → that IP in Cloudflare, cert-manager is not
# involved (Redis protocol is TCP, not HTTPS). Reachable from any LAN
# client using the auth password stored in the RedisHA 1Password item.
#
# With sentinel.enabled=true, bitnami's chart creates a single "redis-node"
# StatefulSet where every pod runs both Redis and a Sentinel sidecar.
# The selector below matches all nodes (app.kubernetes.io/component: node).
#
# Sentinel-aware clients (like ioredis/BullMQ):
#   Connect to redis.lab.techyon.dev:26379, ask for master "mymaster",
#   then connect to the returned pod on 6379.
#
# Simple clients (redis-cli):
#   Connect to redis.lab.techyon.dev:6379. This round-robins across all
#   nodes — writes to a replica get a READONLY error, causing the client
#   to retry. For a home lab this is fine; production would pin to master.
apiVersion: v1
kind: Service
metadata:
  name: redis-lb
  annotations:
    external-dns.alpha.kubernetes.io/hostname: redis.lab.techyon.dev
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Redis
    gethomepage.dev/description: Shared LAN Redis (Sentinel)
    gethomepage.dev/group: Databases
    gethomepage.dev/icon: redis.png
spec:
  type: LoadBalancer
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
    - name: sentinel
      port: 26379
      targetPort: 26379
      protocol: TCP
  selector:
    app.kubernetes.io/instance: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: node
