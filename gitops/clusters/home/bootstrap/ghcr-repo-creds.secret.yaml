apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-repo-creds
  namespace: argocd
spec:
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore

  target:
    name: ghcr-repo-creds
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: helm
        url: ghcr.io/t3chy0n
        username: t3chy0n
        password: "{{ .ghcrToken }}"
        enableOCI: "true"

  data:
    - secretKey: ghcrToken
      remoteRef:
        key: GHCR
        property: password
