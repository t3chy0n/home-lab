# Redis AUTH password for the Immich server to talk to the shared Redis
# cluster in the redis namespace. Pulls from the RedisHA 1Password item
# (same source as the redis-auth Secret in the redis namespace). 15 min
# refresh so password rotations propagate quickly.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-auth-replicated
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: redis-auth-replicated
    creationPolicy: Owner
    template:
      data:
        password: "{{ .rawPassword | trim }}"
  data:
    - secretKey: rawPassword
      remoteRef:
        key: RedisHA
        property: password
