apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-ha
spec:
  instances: 3

  storage:
    size: 8Gi
    storageClass: qnap-iscsi

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"

  monitoring:
    enablePodMonitor: true

  managed:
    roles:
      - name: paperclip
        ensure: present
        login: true
        superuser: false
        createdb: false
        passwordSecret:
          name: pg-role-paperclip
      - name: necronia
        ensure: present
        login: true
        superuser: false
        createdb: false
        passwordSecret:
          name: pg-role-necronia
      - name: techyon
        ensure: present
        login: true
        superuser: false
        createdb: false
        passwordSecret:
          name: pg-role-techyon

  bootstrap:
    initdb:
      postInitSQL:
        - CREATE ROLE paperclip WITH LOGIN PASSWORD 'changeme';
        - CREATE ROLE necronia WITH LOGIN PASSWORD 'changeme';
        - CREATE ROLE techyon WITH LOGIN PASSWORD 'changeme';
        - CREATE DATABASE paperclip OWNER paperclip;
        - CREATE DATABASE necronia OWNER necronia;
        - CREATE DATABASE techyon OWNER techyon;
        - GRANT ALL PRIVILEGES ON DATABASE paperclip TO paperclip;
        - GRANT ALL PRIVILEGES ON DATABASE necronia TO necronia;
        - GRANT ALL PRIVILEGES ON DATABASE techyon TO techyon;
