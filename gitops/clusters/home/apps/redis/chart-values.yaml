# Shared in-cluster Redis with replication (no Sentinel), exposed on the
# LAN as redis.lab.techyon.dev via a MetalLB LoadBalancer Service (see
# manifests/redis-lb-service.yaml). Every stateful consumer in the lab
# that needs a Redis cache points here — Immich is the first one.
#
# Plain replication creates SEPARATE master + replica StatefulSets with
# dedicated Services (redis-master:6379, redis-replicas:6379). Write
# clients connect to redis-master — no READONLY errors. The trade-off
# vs Sentinel: no automatic failover, but for a home lab job queue that's
# fine — StatefulSet restarts a dead master pod within seconds.
#
# Credentials come from the redis-auth Secret (populated by ExternalSecrets
# from the RedisHA 1Password item). Rotating the password in 1Password
# flows through automatically via Reloader (commonAnnotations).

architecture: replication

# Reloader annotation — rolls both master and replica StatefulSets
# whenever the redis-auth Secret content changes.
commonAnnotations:
  reloader.stakater.com/auto: "true"

auth:
  enabled: true
  existingSecret: redis-auth
  existingSecretPasswordKey: password

master:
  persistence:
    enabled: true
    storageClass: qnap-iscsi
    size: 8Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

replica:
  replicaCount: 1
  persistence:
    enabled: true
    storageClass: qnap-iscsi
    size: 8Gi
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# Sentinel disabled — plain replication gives us separate master/replica
# Services which is what we need for write-only clients like Immich.
sentinel:
  enabled: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    additionalLabels:
      release: prometheus-operator
