# grafana/tempo chart — monolithic (single-binary) mode, filesystem backend.
# Not to be confused with grafana/tempo-distributed. Receives OTLP traces from
# the in-cluster alloy DaemonSet, the alloy-gateway (for external apps), and
# any directly-instrumented in-cluster workloads. Grafana reads traces via the
# Tempo datasource wired in prometheus/chart-values.yaml.
# Chart reference: https://github.com/grafana/helm-charts/tree/main/charts/tempo

tempo:
  retention: 168h   # 7 days
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  # Metrics generator: derive service-graph + span (RED) metrics from incoming
  # traces and remote_write them to the main Prometheus. This powers Grafana's
  # Service Graph / Node Graph (the "how an event fans out" topology) and span
  # RED panels. WAL paths live on the persistent volume (mounted at /var/tempo).
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://prometheus-operator-kube-p-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
    registry:
      external_labels:
        source: tempo
    storage:
      path: "/var/tempo/generator/wal"
    traces_storage:
      path: "/var/tempo/generator/traces"

  # Activate the generator processors for the default tenant (without this the
  # generator runs but produces nothing).
  overrides:
    defaults:
      metrics_generator:
        processors:
          - service-graphs
          - span-metrics

persistence:
  enabled: true
  size: 20Gi
  storageClassName: qnap-iscsi

service:
  type: ClusterIP
