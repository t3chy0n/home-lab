# LAN-facing Redis Service pointing at the master only. Mirrors the
# postgres-ha-lb pattern: MetalLB IP + external-dns Cloudflare record.
# With plain replication (no Sentinel), bitnami creates a dedicated
# redis-master StatefulSet labeled component=master — writes always
# reach the correct pod.
apiVersion: v1
kind: Service
metadata:
  name: redis-lb
  annotations:
    external-dns.alpha.kubernetes.io/hostname: redis.lab.techyon.dev
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Redis
    gethomepage.dev/description: Shared LAN Redis
    gethomepage.dev/group: Databases
    gethomepage.dev/icon: redis.png
spec:
  type: LoadBalancer
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app.kubernetes.io/instance: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: master
