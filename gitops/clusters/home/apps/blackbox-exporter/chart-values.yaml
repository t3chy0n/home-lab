# https://github.com/prometheus-community/helm-charts/blob/main/charts/prometheus-blackbox-exporter/values.yaml
#
# Blackbox probes the network from inside the cluster. Each target below
# becomes a ServiceMonitor that tells Prometheus to scrape
# /probe?target=<url>&module=<module> on this exporter.
#
# Targets intentionally form a "chain of failure" so a single dashboard
# shows where the break is: if cameras fail but MikroTik + Halny ping,
# the powerline is the culprit. If Halny fails, the ISP handoff is down.

# NET_RAW is required for ICMP probes. The chart drops all capabilities
# by default — add it back explicitly.
securityContext:
  runAsUser: 0
  runAsGroup: 0
  readOnlyRootFilesystem: true
  runAsNonRoot: false
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
    add: ["NET_RAW"]

# Adds release=prometheus-operator label so kube-prometheus-stack picks up
# ServiceMonitors generated by this chart.
releaseLabel: true

replicas: 1

resources:
  requests:
    cpu: 20m
    memory: 32Mi
  limits:
    memory: 128Mi

config:
  modules:
    icmp:
      prober: icmp
      timeout: 5s
      icmp:
        preferred_ip_protocol: ip4
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        valid_status_codes: []   # defaults to 2xx
        follow_redirects: true
        preferred_ip_protocol: ip4
    dns_google:
      prober: dns
      timeout: 5s
      dns:
        query_name: "www.google.com"
        query_type: "A"
        preferred_ip_protocol: ip4
    tcp_connect:
      prober: tcp
      timeout: 5s

serviceMonitor:
  enabled: true

  defaults:
    labels:
      release: prometheus-operator
    interval: 30s
    scrapeTimeout: 10s
    honorTimestamps: true
    module: icmp

  # Probe matrix — the break-localizer.
  # Names show up as `instance=<name>` in Grafana, so keep them readable.
  targets:
    # --- LAN infrastructure ---
    - name: gateway-halny
      url: 192.168.33.1          # ISP router
      module: icmp
    - name: mikrotik-switch
      url: 192.168.33.19
      module: icmp
    - name: nas-qnap
      url: 192.168.33.14
      module: icmp
    - name: k8s-node-1
      url: 192.168.33.3
      module: icmp
    - name: k8s-node-2
      url: 192.168.33.2
      module: icmp
    - name: k8s-node-3
      url: 192.168.33.7
      module: icmp

    # --- Powerline link (paired TP-Link adapters) ---
    # Zero services on either adapter but they still ARP-reply; drops in
    # RTT to these vs the MikroTik indicate powerline degradation.
    - name: powerline-near
      url: 192.168.33.23
      module: icmp
    - name: powerline-far
      url: 192.168.33.24
      module: icmp

    # --- Pi-hole (in-cluster DNS) ---
    - name: pihole-dns-lb
      url: 192.168.32.53
      module: icmp

    # --- Internet reachability ---
    - name: internet-cloudflare
      url: 1.1.1.1
      module: icmp
    - name: internet-google
      url: 8.8.8.8
      module: icmp

    # --- DNS resolution ---
    - name: dns-upstream-cloudflare
      url: 1.1.1.1
      module: dns_google
    - name: dns-upstream-google
      url: 8.8.8.8
      module: dns_google
    - name: dns-pihole
      url: 192.168.32.53
      module: dns_google

    # --- End-to-end HTTP ---
    - name: http-google
      url: https://www.google.com
      module: http_2xx
