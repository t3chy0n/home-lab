# grafana/alloy chart — DaemonSet role: tails pod logs on every node and ships
# them to the in-cluster Loki. This is the log-collection sidecar of the
# observability stack. Traces and external-app ingest are handled by a separate
# alloy-gateway Deployment (see ../alloy-gateway/).
#
# Config uses discovery.kubernetes to label log streams by namespace/pod/container/node
# and loki.source.kubernetes to stream the logs directly via the Kubernetes API
# (no hostPath mounts required).

controller:
  type: daemonset

alloy:
  configMap:
    content: |
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
        rule {
          action        = "replace"
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
          separator     = "/"
          target_label  = "job"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

rbac:
  create: true

serviceAccount:
  create: true
