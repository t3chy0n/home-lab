# Password for the immich Postgres role in the dedicated CNPG cluster.
# Reuses the existing PostgresHA 1Password item — same password string
# as the shared postgres-ha roles, just applied to a separate cluster.
# CNPG expects 'username' and 'password' keys in the bootstrap secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pg-role-immich
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: pg-role-immich
    creationPolicy: Owner
    template:
      data:
        username: immich
        password: "{{ .rawPassword | trim }}"
  data:
    - secretKey: rawPassword
      remoteRef:
        key: PostgresHA
        property: password
