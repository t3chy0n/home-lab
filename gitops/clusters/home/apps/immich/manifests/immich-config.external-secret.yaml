# Immich server configuration (immich-config.json) rendered from a template
# that injects Google OAuth credentials from the shared GoogleOauthClient
# 1Password item. The resulting Secret is referenced by the Immich Helm
# chart via immich.existingConfiguration.
#
# This keeps OAuth client credentials out of git while remaining fully
# GitOps — the template is in git, the secret values are in 1Password.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: immich-config
    creationPolicy: Owner
    template:
      data:
        immich-config.yaml: |
          {
            "oauth": {
              "enabled": true,
              "issuerUrl": "https://accounts.google.com",
              "clientId": "{{ .rawClientID | trim }}",
              "clientSecret": "{{ .rawClientSecret | trim }}",
              "scope": "openid email profile",
              "signingAlgorithm": "RS256",
              "buttonText": "Login with Google",
              "autoRegister": true,
              "autoLaunch": false,
              "mobileOverrideEnabled": true,
              "mobileRedirectUri": "https://photos.lab.techyon.dev/api/oauth/mobile-redirect",
              "defaultStorageQuota": 0
            },
            "passwordLogin": {
              "enabled": true
            }
          }
  data:
    - secretKey: rawClientID
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthClientId.txt
    - secretKey: rawClientSecret
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthSecretId.txt
