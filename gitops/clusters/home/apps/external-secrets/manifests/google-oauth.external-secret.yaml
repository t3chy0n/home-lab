# Google OAuth credentials fanned out from a single 1Password item to the
# namespaces that need them. The 1Password item "GoogleOauthClient" holds the
# web application OAuth client created for the techyon.dev Workspace.
#
# 1Password file-attachment fields (the *.txt entries) preserve any trailing
# newline from the original file, which would be baked into the resulting
# Kubernetes Secret. Google rejects "clientId\n" as an unknown client, so
# every data entry below goes through a spec.target.template that runs
# the raw value through Sprig's `trim` to strip surrounding whitespace.
#
# Each ExternalSecret sets metadata.namespace explicitly so a single file can
# create Secrets in multiple namespaces — ArgoCD's default AppProject permits
# any destination namespace, and the ExternalSecrets operator syncs each CR
# in place.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: google-oauth-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: argocd-google-oidc
    creationPolicy: Owner
    template:
      # ArgoCD's $<secret-name>:<field> reference lookup in argocd-cm only
      # resolves against Secrets that carry this label.
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
      data:
        clientID:     "{{ .rawClientID | trim }}"
        clientSecret: "{{ .rawClientSecret | trim }}"
  data:
    - secretKey: rawClientID
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthClientId.txt
    - secretKey: rawClientSecret
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthSecretId.txt
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: google-oauth-creds
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: grafana-google-oidc
    creationPolicy: Owner
    template:
      data:
        # Grafana reads GF_AUTH_GOOGLE_CLIENT_ID / GF_AUTH_GOOGLE_CLIENT_SECRET
        # from the environment and overrides the corresponding grafana.ini keys.
        GF_AUTH_GOOGLE_CLIENT_ID:     "{{ .rawClientID | trim }}"
        GF_AUTH_GOOGLE_CLIENT_SECRET: "{{ .rawClientSecret | trim }}"
  data:
    - secretKey: rawClientID
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthClientId.txt
    - secretKey: rawClientSecret
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthSecretId.txt
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-creds
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-creds
    creationPolicy: Owner
    template:
      data:
        # Key names must be client-id / client-secret / cookie-secret —
        # the oauth2-proxy Helm chart hardcodes these as the secret key names
        # when config.existingSecret is set (see oauth2-proxy chart deployment
        # template around lines 183-203).
        client-id:     "{{ .rawClientID | trim }}"
        client-secret: "{{ .rawClientSecret | trim }}"
        cookie-secret: "{{ .rawCookieSecret | trim }}"
  data:
    - secretKey: rawClientID
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthClientId.txt
    - secretKey: rawClientSecret
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthSecretId.txt
    - secretKey: rawCookieSecret
      remoteRef:
        key: GoogleOauthClient
        property: GoogleOauthCookieSecret.txt
