replicaCount: 1

image:
  repository: ghcr.io/t3chy0n/github-mcp-proxy
  tag: "0.1.1"
  pullPolicy: IfNotPresent

# Pull from GHCR via the `ghcr-docker` Secret rendered by the
# ghcr-docker.external-secret.yaml manifest in this dir. (Without this the
# pod hits ImagePullBackOff because the `mcp` namespace doesn't inherit
# pull secrets from elsewhere — each namespace gets its own.)
imagePullSecrets:
  - name: ghcr-docker

envFromSecret:
  name: github-mcp-pat-secret

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: github-mcp.lab.techyon.dev
  clusterIssuer: cloudflare-ca
  tlsSecretName: github-mcp-tls
  # Basic-auth at the ingress edge. Snippet annotations are disabled
  # cluster-wide (CVE-2022-4886). The Secret `github-mcp-basic-auth` is
  # rendered by github-mcp-basic-auth.external-secret.yaml in this dir
  # (sources username + password from 1Password item GH_MCP_BASIC_AUTH).
  basicAuth:
    enabled: true
    secretName: github-mcp-basic-auth
    realm: "MCP"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi
