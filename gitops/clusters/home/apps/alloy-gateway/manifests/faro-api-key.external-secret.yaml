# Shared secret used as the x-api-key header on Faro browser → alloy-gateway
# requests. The receiver (chart-values.yaml → faro.receiver.server.api_key)
# reads the value from the FARO_API_KEY env var, which is sourced from the
# Secret this ExternalSecret syncs.
#
# Pattern matches redis-auth / google-oauth-creds: one 1Password item, one
# ExternalSecret, synced on a 15m interval so rotations propagate quickly.
#
# *** SETUP REQUIRED BEFORE PUSHING ***
# 1. In 1Password, create item "FaroApiKey" in the same vault the cluster
#    secret store reads from (same vault as GoogleOauthClient / RedisHA).
# 2. Add a field named `apiKey` (text) with a 32+ char random value:
#       openssl rand -hex 32
# 3. Copy the same value into your Next.js app's NEXT_PUBLIC_FARO_API_KEY env.
#
# Without step 1/2 the ExternalSecret sync fails and alloy-gateway
# CrashLoopBackOffs because sys.env("FARO_API_KEY") resolves to "".
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: faro-api-key
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: faro-api-key
    creationPolicy: Owner
    template:
      data:
        apiKey: "{{ .rawApiKey | trim }}"
  data:
    - secretKey: rawApiKey
      remoteRef:
        key: FaroApiKey
        property: apiKey
