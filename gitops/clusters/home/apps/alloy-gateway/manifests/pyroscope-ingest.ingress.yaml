# No-auth HTTPS route for Pyroscope profile ingest from external apps (e.g. Necronia dev server).
# The CLR profiler pushes to https://pyroscope-ingest.lab.techyon.dev; alloy-gateway receives
# on :12348 via pyroscope.receive_http and forwards to in-cluster Pyroscope.
#
# No oauth2-proxy — consistent with otel.lab.techyon.dev (machine push, not browser login).
# external-dns creates the Cloudflare A record automatically.
# cert-manager issues the TLS cert via DNS-01 against the cloudflare-ca ClusterIssuer.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alloy-pyroscope-ingest
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: cloudflare-ca
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Observability
    gethomepage.dev/name: Pyroscope Ingest
    gethomepage.dev/description: Pyroscope profile ingest (no-auth, machine push)
    gethomepage.dev/icon: pyroscope.png
    gethomepage.dev/href: https://pyroscope-ingest.lab.techyon.dev
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pyroscope-ingest.lab.techyon.dev
      secretName: alloy-pyroscope-ingest-tls
  rules:
    - host: pyroscope-ingest.lab.techyon.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alloy-gateway
                port:
                  number: 12348
