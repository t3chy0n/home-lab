# Public HTTPS route for the Grafana Faro Web SDK receiver running inside
# alloy-gateway on :12347. Browser clients POST to
# https://faro.lab.techyon.dev/collect with an `x-api-key` header matching
# the value in the faro-api-key Secret; the receiver rejects mismatches.
#
# external-dns creates the Cloudflare A record automatically from this host.
# cert-manager issues the TLS cert via DNS-01 against the cloudflare-ca ClusterIssuer.
#
# Companion to alloy-gateway.ingress.yaml (otel.lab.techyon.dev → :4318 OTLP).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alloy-faro
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: cloudflare-ca
    # Faro batches telemetry events client-side; a single POST can carry a
    # session's worth of logs/spans. 10m matches the receiver's max payload.
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # CORS — Alloy's faro.receiver sets cors_allowed_origins but the nginx
    # ingress intercepts the OPTIONS preflight before it reaches the pod.
    # Let nginx handle CORS at the edge so browser SDK requests from
    # localhost and *.techyon.dev origins succeed.
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:3000, http://localhost:3001, https://tokyo-admin.lab.techyon.dev, https://*.techyon.dev"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, x-api-key"
    # Defense in depth — Alloy's faro.receiver has rate_limiting, but nginx
    # caps it at the edge too so malicious clients can't exhaust the pod.
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Homepage auto-discovery — mirrors the otel gateway pattern.
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Observability
    gethomepage.dev/name: Faro Collector
    gethomepage.dev/description: Browser telemetry ingest (Grafana Faro Web SDK)
    gethomepage.dev/icon: alloy.png
    gethomepage.dev/href: https://faro.lab.techyon.dev
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - faro.lab.techyon.dev
      secretName: alloy-faro-tls
  rules:
    - host: faro.lab.techyon.dev
      http:
        paths:
          - path: /collect
            pathType: Prefix
            backend:
              service:
                name: alloy-gateway
                port:
                  number: 12347
