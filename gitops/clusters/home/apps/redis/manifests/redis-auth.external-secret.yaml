# Redis AUTH password populated from the RedisHA 1Password item.
# refreshInterval is 15 minutes so rotations propagate relatively quickly.
# Stakater Reloader watches the resulting `redis-auth` Secret and rolls the
# master + replica StatefulSets (annotated in ../chart-values.yaml) when the
# content changes, so clients come back up on the new password automatically.
#
# Note the Sprig `trim` — 1Password file-attachment fields ship with a
# trailing newline which Redis would otherwise bake into the requirepass
# value and reject on every auth. Applied to every data entry in the
# google-oauth fan-out file too (see ../../external-secrets/manifests/).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-auth
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: one-password
    kind: ClusterSecretStore
  target:
    name: redis-auth
    creationPolicy: Owner
    template:
      data:
        password: "{{ .rawPassword | trim }}"
  data:
    - secretKey: rawPassword
      remoteRef:
        key: RedisHA
        property: password
