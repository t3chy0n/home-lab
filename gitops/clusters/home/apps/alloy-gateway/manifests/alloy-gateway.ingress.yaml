apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alloy-gateway
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: cloudflare-ca
    # OTLP HTTP payloads (especially batched log exports) can exceed the
    # default 1m body limit — bump it for telemetry traffic.
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Homepage auto-discovery — mirrors the argocd/grafana ingress pattern.
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Observability
    gethomepage.dev/name: OTel Gateway
    gethomepage.dev/description: OTLP ingest for external apps
    gethomepage.dev/icon: alloy.png
    gethomepage.dev/href: https://otel.lab.techyon.dev
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - otel.lab.techyon.dev
      secretName: alloy-gateway-tls
  rules:
    - host: otel.lab.techyon.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: alloy-gateway
                port:
                  number: 4318
